<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>코치 패널 — 오늘일기</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="app wide" style="padding-bottom:28px;">

  <header class="topbar">
    <div class="brand"><span class="dot"></span> 코치 패널</div>
    <div class="spacer"></div>
    <span class="chip" id="coach-name">코치</span>
    <button class="ico-btn" id="out" onclick="logout()"></button>
  </header>

  <main class="page">
    <div class="seg" id="seg">
      <button class="on" data-t="dash">대시보드</button>
      <button data-t="review">검토 <span id="rv-ct"></span></button>
      <button data-t="connect">멤버 연결</button>
    </div>

    <!-- 대시보드 -->
    <section data-pane="dash">
      <div class="kpi-row">
        <div class="kpi"><div class="n" id="k-members">–</div><div class="l">함께하는 멤버</div></div>
        <div class="kpi"><div class="n" id="k-alerts" style="color:var(--danger);">–</div><div class="l">살펴볼 신호</div></div>
        <div class="kpi"><div class="n" id="k-reviews" style="color:var(--gold);">–</div><div class="l">검토 대기</div></div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:12px;">살펴볼 신호</div>
        <div id="alerts"><p class="small muted" style="margin:0;">불러오는 중…</p></div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">함께하는 멤버</span><span class="small muted">이행률 · 평균기분</span></div>
        <div id="members"></div>
      </div>
    </section>

    <!-- 검토 -->
    <section data-pane="review" hidden>
      <div class="card">
        <div class="card-title" style="margin-bottom:6px;">미션 인증 검토</div>
        <p class="small muted" style="margin:0 0 14px;">제출된 인증을 확인하고 승인 / 반려하세요.</p>
        <div id="reviews"></div>
      </div>
    </section>

    <!-- 멤버 연결 -->
    <section data-pane="connect" hidden>
      <div class="card">
        <div class="card-title" style="margin-bottom:6px;">연결 대기 멤버</div>
        <p class="small muted" style="margin:0 0 14px;">가입 시 <b>나를 담당 코치로 지정</b>한 멤버만 표시됩니다.</p>
        <div id="unconnected"></div>
      </div>
    </section>

    <!-- 멤버 상세 -->
    <section id="detail" hidden></section>
  </main>
</div>

<!-- 검토 모달 -->
<div class="modal-bg" id="m-review">
  <div class="modal">
    <div class="grip"></div>
    <div class="between" style="margin-bottom:12px;">
      <h3 style="margin:0;font-size:17px;font-weight:800;" id="r-name"></h3>
      <span class="badge wait">검토 대기</span>
    </div>
    <div id="r-img" style="aspect-ratio:16/10;border-radius:14px;background:linear-gradient(135deg,#DCE8E3,#EFE6DA);display:grid;place-items:center;color:var(--muted);margin-bottom:14px;overflow:hidden;" class="small">이미지 없음</div>
    <div class="field"><label>미션 / 멤버 메모</label><div class="card flat" style="margin:0;background:var(--surface-2);" id="r-task"></div></div>
    <div class="field"><label>코멘트</label><textarea id="r-note" placeholder="응원 / 피드백 한마디"></textarea></div>
    <div class="grid2">
      <button class="btn line danger-ghost" onclick="doReview(false)">반려</button>
      <button class="btn" onclick="doReview(true)">승인</button>
    </div>
  </div>
</div>

<!-- 메인 목표 수정 모달 -->
<div class="modal-bg" id="m-maingoal">
  <div class="modal">
    <div class="grip"></div>
    <h3 style="margin:0 0 4px;font-size:17px;font-weight:800;" id="mg-name"></h3>
    <p class="small muted" style="margin:0 0 16px;">멤버 홈의 ‘오늘의 미션’으로 표시됩니다.</p>
    <div class="field"><label>메인 목표</label><textarea id="mg-text" placeholder="예: 매일 11시 전 취침"></textarea></div>
    <button class="btn" id="mg-save" onclick="saveMainGoal()">저장하기</button>
    <button class="btn line mt8" onclick="closeModal('m-maingoal')">닫기</button>
  </div>
</div>

<!-- 연결 모달 -->
<div class="modal-bg" id="m-connect">
  <div class="modal">
    <div class="grip"></div>
    <h3 style="margin:0 0 4px;font-size:17px;font-weight:800;" id="c-name"></h3>
    <p class="small muted" style="margin:0 0 16px;">오늘부터 30일 여정을 시작합니다.</p>
    <div class="field"><label>이번 30일 목표 메모 (선택)</label><textarea id="c-goal" placeholder="예: 수면 루틴 안정화"></textarea></div>
    <button class="btn" onclick="doConnect()">연결하고 시작</button>
    <button class="btn line mt8" onclick="closeModal('m-connect')">닫기</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js"></script>
<script src="assets/api.js"></script>
<script src="assets/app.js"></script>
<script>
  let ME, REVIEWS = [], MEMBERS = [], CUR_REVIEW = null, CUR_CONNECT = null, CUR_MAIN = null, DETAIL_I = null;
  const CELL = { approved:'done', pending_review:'wait', failed:'fail', today:'today', locked:'locked', skipped:'locked' };
  const ST = { approved:['완료','ok'], pending_review:['검토중','wait'], failed:['놓침','fail'], today:['오늘','wait'], locked:['예정','muted'], skipped:['건너뜀','muted'] };
  const MOODC = ['#D9755B','#E89B72','#C9B873','#7DA697','#4F7C72'];
  const WD = s => ['일','월','화','수','목','금','토'][new Date(s + 'T00:00:00').getDay()];

  (async function init() {
    document.getElementById('out').innerHTML = icon('logout', 18);
    ME = await API.guard('coach');
    if (!ME) return;
    document.getElementById('coach-name').textContent = ME.name;

    document.getElementById('seg').addEventListener('click', e => {
      const b = e.target.closest('button[data-t]'); if (!b) return;
      document.querySelectorAll('#seg button').forEach(x => x.classList.remove('on')); b.classList.add('on');
      document.querySelectorAll('[data-pane]').forEach(p => p.hidden = p.dataset.pane !== b.dataset.t);
      window.scrollTo({ top: 0 });
    });

    await Promise.all([loadDash(), loadReviews(), loadConnect()]);
  })();

  async function loadDash() {
    const [members, alerts] = await Promise.all([API.coachMembers(ME.id), API.alerts(ME.id)]);
    MEMBERS = members;
    document.getElementById('k-members').textContent = members.length;
    document.getElementById('k-alerts').textContent = alerts.length;

    document.getElementById('alerts').innerHTML = alerts.length ? alerts.map(a => `
      <div class="alert ${a.severity === 'high' ? '' : 'warn'}">
        <div><div class="t">${a.member?.name || '멤버'} · ${a.type === 'missed_streak' ? '미션 미제출' : '기분 하락'}</div>
        <div class="d">${a.message}</div></div></div>`).join('')
      : '<p class="small muted" style="margin:0;">지금은 특별히 살펴볼 신호가 없어요.</p>';

    document.getElementById('members').innerHTML = members.length ? members.map((c, i) => `
      <div class="list-item" style="cursor:pointer;" onclick="openMember(${i})">
        <div class="avatar">${(c.member?.name || '?')[0]}</div>
        <div class="meta"><div class="nm">${c.member?.name || '멤버'}</div>
          <div class="sub">DAY ${c.day}/30 · 이행률 ${c.rate}% · 기분 ${c.moodAvg || '–'}</div>
          <div class="sub" style="color:var(--primary-d);">🎯 ${c.goal_summary || '메인 목표 미설정'}</div></div>
        <span class="muted" style="font-size:22px;line-height:1;">›</span>
      </div>`).join('')
      : '<p class="small muted" style="margin:0;">아직 연결된 멤버가 없어요. ‘멤버 연결’ 탭에서 시작하세요.</p>';
  }

  function openEditMain(i) {
    const c = MEMBERS[i]; if (!c) return;
    CUR_MAIN = c.id;
    document.getElementById('mg-name').textContent = `${c.member?.name || '멤버'} · 메인 목표`;
    document.getElementById('mg-text').value = c.goal_summary || '';
    openModal('m-maingoal');
  }
  async function saveMainGoal() {
    const text = document.getElementById('mg-text').value.trim();
    if (!text) return toast('메인 목표를 입력해주세요');
    const btn = document.getElementById('mg-save'); btn.disabled = true; btn.textContent = '저장 중…';
    try {
      await API.updateEnrollmentGoal(CUR_MAIN, text);
      closeModal('m-maingoal'); toast('메인 목표를 수정했어요');
      await loadDash();
      if (!document.getElementById('detail').hidden && DETAIL_I != null) await openMember(DETAIL_I);
    } catch (e) { toast(e.message || '저장 실패'); }
    finally { btn.disabled = false; btn.textContent = '저장하기'; }
  }

  /* ---------------- 멤버 상세 ---------------- */
  async function openMember(i) {
    const c = MEMBERS[i]; if (!c) return;
    DETAIL_I = i;
    document.getElementById('seg').hidden = true;
    document.querySelectorAll('[data-pane]').forEach(p => p.hidden = true);
    const d = document.getElementById('detail');
    d.hidden = false;
    d.innerHTML = '<p class="small muted">불러오는 중…</p>';
    window.scrollTo({ top: 0 });

    const eid = c.id;
    const [stats, tasks, logs, goals, notes] = await Promise.all([
      API.enrollmentStats(eid), API.tracker(eid), API.moodAll(eid), API.goals(eid), API.notes(eid),
    ]);
    await Promise.all(tasks.filter(t => t.proof_url).map(async t => {
      const { data } = await sb.storage.from('proofs').createSignedUrl(t.proof_url, 600);
      t._img = data?.signedUrl || null;
    }));
    renderDetail(c, stats, tasks, logs, goals, notes);
  }

  function renderDetail(c, stats, tasks, logs, goals, notes) {
    const name = c.member?.name || '멤버';
    const todayKST = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' });

    const cells = tasks.map(t => `<div class="cell ${CELL[t.status] || 'locked'}">${t.day_number}</div>`).join('');

    let chart;
    if (logs.length >= 2) {
      const r = logs.slice(-14);
      chart = lineChart([r.map(l => l.mood), r.map(l => l.energy ?? l.mood)]);
    } else chart = '<p class="small muted center" style="padding:20px 0;">기분 기록이 2개 이상이면 그래프가 나와요.</p>';

    const goalsHtml = goals.length ? goals.map(g => {
      const pct = Math.min(100, Math.round(g.current_value / g.target_value * 100));
      return `<div style="margin-bottom:12px;"><div class="between" style="margin-bottom:5px;">
        <span class="small" style="font-weight:700;">${g.title}</span>
        <span class="small muted">${g.current_value}/${g.target_value}${g.unit || ''}</span></div>
        <div class="progress warm"><i style="width:${pct}%"></i></div></div>`;
    }).join('') : '<p class="small muted" style="margin:0;">등록된 서브 목표가 없어요.</p>';

    const byDate = {};
    tasks.forEach(t => { (byDate[t.date] = byDate[t.date] || {}).task = t; });
    logs.forEach(l => { (byDate[l.date] = byDate[l.date] || {}).mood = l; });
    const days = Object.keys(byDate).map(dd => ({ date: dd, ...byDate[dd] }))
      .filter(x => (x.task && ['approved','pending_review','failed'].includes(x.task.status)) || x.mood)
      .sort((a, b) => (a.date < b.date ? 1 : -1));
    const feed = days.length ? days.map(x => {
      const [stL, stC] = x.task ? (ST[x.task.status] || ST.locked) : [null, null];
      let body = '';
      if (x.task && ['approved','pending_review','failed'].includes(x.task.status)) {
        if (x.task._img) body += `<div style="border-radius:10px;overflow:hidden;margin:8px 0;"><img src="${x.task._img}" style="width:100%;display:block;"></div>`;
        body += `<div class="small">${x.task.proof_text || '<span class="muted">인증 메모 없음</span>'}</div>`;
      }
      if (x.mood) { const cc = MOODC[x.mood.mood - 1];
        body += `<div class="row" style="gap:8px;margin-top:8px;align-items:flex-start;">
          <div class="avatar" style="width:30px;height:30px;border-radius:10px;background:${cc}1f;color:${cc};font-size:12px;">${x.mood.mood}</div>
          <div class="meta"><div class="sub">느낀점 · ${MOOD_LABELS[x.mood.mood - 1]}${x.mood.energy ? ` · 에너지 ${x.mood.energy}` : ''}</div>
            <div class="small">${x.mood.note || '<span class="muted">한 줄 기록</span>'}</div></div></div>`;
      }
      if (x.task && x.task.review_note) body += `<div style="margin-top:8px;padding:9px 11px;border-radius:11px;background:var(--primary-soft);" class="small"><b style="color:var(--primary-d);">내 피드백</b> · <span style="color:var(--primary-d);">${x.task.review_note}</span></div>`;
      return `<div style="padding:12px 0;border-bottom:1px solid var(--line);">
        <div class="between"><strong class="small">${x.task ? `DAY ${x.task.day_number} · ` : ''}${x.date.slice(5).replace('-', '.')} (${WD(x.date)})</strong>
        ${stL ? `<span class="badge ${stC}">${stL}</span>` : ''}</div>${body}</div>`;
    }).join('') : '<p class="small muted" style="margin:0;">아직 기록이 없어요.</p>';

    const notesHtml = notes.length ? notes.map(n => `<div style="padding:11px 0;border-bottom:1px solid var(--line);">
      <div class="between"><div class="small" style="font-weight:700;">${n.summary}</div>
        <span class="chip" style="flex-shrink:0;">${n.note_date || (n.created_at || '').slice(0, 10)}</span></div>
      ${n.next_focus ? `<div class="small muted" style="margin-top:3px;">다음 포커스: ${n.next_focus}</div>` : ''}</div>`).join('')
      : '<p class="small muted" style="margin:0;">아직 작성한 노트가 없어요.</p>';

    document.getElementById('detail').innerHTML = `
      <button class="btn sm line" onclick="backToDash()" style="margin-bottom:14px;">← 멤버 목록</button>
      <div class="row" style="gap:12px;margin-bottom:16px;">
        <div class="avatar" style="width:54px;height:54px;border-radius:17px;font-size:21px;">${name[0]}</div>
        <div><div style="font-weight:800;font-size:19px;">${name}</div>
          <div class="small muted">DAY ${stats.day}/30 · ${c.start_date} ~ ${c.end_date}</div></div>
      </div>

      <section class="card hero">
        <div class="between"><span class="eyebrow">메인 목표 · 오늘의 미션</span>
          <button class="btn sm line" onclick="openEditMain(${DETAIL_I})">수정</button></div>
        <h2 style="margin:8px 0 0;">${c.goal_summary || '메인 목표 미설정'}</h2>
      </section>

      <div class="kpi-row">
        <div class="kpi"><div class="n" style="color:var(--primary);">${stats.done}</div><div class="l">완료</div></div>
        <div class="kpi"><div class="n" style="color:var(--gold);">${stats.wait}</div><div class="l">검토중</div></div>
        <div class="kpi"><div class="n" style="color:var(--danger);">${stats.failed}</div><div class="l">놓침</div></div>
      </div>
      <div class="card">
        <div class="between" style="margin-bottom:8px;"><span class="small muted">이행률</span>
          <span style="font-weight:800;color:var(--primary-d);">${stats.rate}%</span></div>
        <div class="progress"><i style="width:${stats.rate}%"></i></div>
        <div class="between mt12"><span class="small muted">평균 기분</span><span style="font-weight:800;">${stats.moodAvg || '–'}</span></div>
      </div>

      <div class="card"><div class="card-title" style="margin-bottom:12px;">30일 트래커</div>
        <div class="tracker">${cells || '<p class="small muted" style="margin:0;">아직 시작 전이에요.</p>'}</div></div>

      <div class="card"><div class="card-head"><span class="card-title">기분·에너지 추이</span><span class="small muted">1~5</span></div>${chart}
        <div class="legend"><span><i style="background:#4F7C72;"></i>기분</span><span><i style="background:#E89B72;"></i>에너지</span></div></div>

      <div class="card"><div class="card-title" style="margin-bottom:12px;">서브 목표</div>${goalsHtml}</div>

      <div class="card"><div class="card-title" style="margin-bottom:6px;">기록 타임라인</div>
        <p class="small muted" style="margin:0 0 8px;">미션 인증 · 느낀점 · 내 피드백</p>${feed}</div>

      <div class="card"><div class="card-title" style="margin-bottom:12px;">코치 노트</div>
        <div class="field"><label>노트 날짜</label><input type="date" id="note-date" value="${todayKST}"></div>
        <div class="field"><textarea id="note-summary" placeholder="관찰/상담 요약"></textarea></div>
        <div class="field"><input id="note-focus" placeholder="다음 포커스 (선택)"></div>
        <button class="btn sm" onclick="saveNote()">노트 추가</button>
        <div class="hr"></div>${notesHtml}</div>`;
    window.scrollTo({ top: 0 });
  }

  function backToDash() {
    document.getElementById('detail').hidden = true;
    DETAIL_I = null;
    document.getElementById('seg').hidden = false;
    const active = document.querySelector('#seg button.on')?.dataset.t || 'dash';
    document.querySelectorAll('[data-pane]').forEach(p => p.hidden = p.dataset.pane !== active);
    window.scrollTo({ top: 0 });
  }

  async function saveNote() {
    const c = MEMBERS[DETAIL_I]; if (!c) return;
    const s = document.getElementById('note-summary').value.trim();
    if (!s) return toast('노트 내용을 입력해주세요');
    const focus = document.getElementById('note-focus').value.trim();
    const date = document.getElementById('note-date').value || null;
    try {
      await API.addNote(c.id, s, focus, date);
      toast('노트를 추가했어요'); await openMember(DETAIL_I);
    } catch (e) { toast(e.message || '추가 실패'); }
  }

  async function loadReviews() {
    REVIEWS = await API.pendingReviews(ME.id);
    document.getElementById('rv-ct').textContent = REVIEWS.length || '';
    document.getElementById('k-reviews').textContent = REVIEWS.length;
    document.getElementById('reviews').innerHTML = REVIEWS.length ? REVIEWS.map((r, i) => `
      <div class="list-item">
        <div class="avatar warm">${(r.member?.name || '?')[0]}</div>
        <div class="meta"><div class="nm">${r.member?.name || '멤버'} · DAY ${r.day_number}</div>
          <div class="sub">${r.mission}</div></div>
        <button class="btn sm" onclick="openReview(${i})">검토</button>
      </div>`).join('')
      : '<p class="small muted" style="margin:0;">검토 대기 중인 인증이 없어요.</p>';
  }

  async function loadConnect() {
    const list = await API.unconnectedMembers(ME.name);
    document.getElementById('unconnected').innerHTML = list.length ? list.map((m, i) => `
      <div class="list-item">
        <div class="avatar">${m.name[0]}</div>
        <div class="meta"><div class="nm">${m.name}</div><div class="sub">${m.email}</div></div>
        <button class="btn sm" onclick="openConnect('${m.id}','${m.name.replace(/'/g,"")}')">연결</button>
      </div>`).join('')
      : `<p class="small muted" style="margin:0;">‘${ME.name}’ 코치를 지정한 대기 멤버가 없어요.</p>`;
  }

  async function openReview(i) {
    CUR_REVIEW = REVIEWS[i];
    document.getElementById('r-name').textContent = `${CUR_REVIEW.member?.name || '멤버'} · DAY ${CUR_REVIEW.day_number}`;
    document.getElementById('r-task').textContent = CUR_REVIEW.mission + (CUR_REVIEW.proof_text ? ` — “${CUR_REVIEW.proof_text}”` : '');
    document.getElementById('r-note').value = '';
    const box = document.getElementById('r-img');
    box.innerHTML = '이미지 불러오는 중…';
    if (CUR_REVIEW.proof_url) {
      const { data } = await sb.storage.from('proofs').createSignedUrl(CUR_REVIEW.proof_url, 600);
      box.innerHTML = data?.signedUrl ? `<img src="${data.signedUrl}" style="width:100%;height:100%;object-fit:cover;">` : '이미지 없음';
    } else box.innerHTML = '사진 없음 (텍스트 인증)';
    openModal('m-review');
  }
  async function doReview(approve) {
    try {
      await API.reviewTask(CUR_REVIEW.id, approve, document.getElementById('r-note').value);
      closeModal('m-review'); toast(approve ? '승인 완료' : '반려 처리');
      await Promise.all([loadReviews(), loadDash()]);
    } catch (e) { toast(e.message || '처리 실패'); }
  }

  function openConnect(id, name) { CUR_CONNECT = id; document.getElementById('c-name').textContent = `${name} 연결`; document.getElementById('c-goal').value = ''; openModal('m-connect'); }
  async function doConnect() {
    try {
      await API.connectMember(CUR_CONNECT, ME.id, document.getElementById('c-goal').value);
      closeModal('m-connect'); toast('연결 완료 · 30일 시작');
      await Promise.all([loadConnect(), loadDash()]);
    } catch (e) { toast(e.message || '연결 실패'); }
  }
  async function logout() { await API.signOut(); location.href = 'index.html'; }
</script>
