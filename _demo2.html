<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="assets/style.css"><style>body{background:#F6F4EF;}</style></head>
<body><div class="app" id="app" style="min-height:auto;"></div><script src="assets/app.js"></script><script>
const IMG=s=>`<img src="docs/screens/${s}" style="width:150px;height:150px;object-fit:contain;">`;
const S={home(){const done=9,wait=1,fail=1,remain=18,rate=82,streak=4,dayNo=12;return `<div class="app">
<header class="topbar"><div class="brand"><span class="dot"></span> 오늘일기</div><div class="spacer"></div><button class="ico-btn">${icon('bell',19)}</button></header>
<main class="page"><div class="greet-block"><span class="date-chip">6월 27일 (토) · 오후 3:56</span><h1 class="greet">지수님,<br>나른한 오후예요 🌿</h1><p class="greet-sub">오늘도 한 걸음, 같이 가요.</p><div class="affirm">“하루 한 걸음이면 충분해”</div></div>
<section class="card" style="text-align:center;">${IMG('char2.png')}<div style="font-weight:800;margin-top:4px;">오늘이 · 차근차근</div><div class="small muted" style="margin-top:2px;">따뜻한 차 한 잔처럼, 꾸준함이 쌓이고 있어요 ☕</div><div class="small" style="color:var(--primary);font-weight:700;margin-top:6px;">성장 가이드 보기 ›</div></section>
<section class="card hero"><div class="between"><span class="eyebrow">오늘의 미션</span><div class="row" style="gap:6px;"><span class="day-pill">🔥 ${streak}일</span><span class="day-pill">DAY ${dayNo} / 30</span></div></div><h2>수면 루틴 안정화</h2><button class="btn warm">인증하기</button></section>
<section class="card streak-card"><div class="streak-flame">🔥</div><div><div class="streak-n">${streak}일 연속 인증 중!</div><div class="small muted">오늘도 이어가면 ${streak+1}일 🔥</div></div></section>
<section class="card"><div class="card-head"><span class="card-title">오늘 기분은 어때요?</span><span class="small muted">기록됨</span></div><div class="mood-row">${[1,2,3,4,5].map(v=>`<div class="mood-opt ${v===4?'on':''}">${v}</div>`).join('')}</div></section>
<section class="card"><div class="card-head"><span class="card-title">30일 여정</span><a class="small" style="color:var(--primary);font-weight:700;">전체 보기</a></div><div class="between" style="margin-bottom:8px;"><span class="small muted">이행률</span><span style="font-weight:800;color:var(--primary-d);">${rate}%</span></div><div class="progress"><i style="width:${rate}%"></i></div><div class="row mt16" style="justify-content:space-between;text-align:center;"><div><div style="font-weight:800;font-size:18px;color:var(--primary);">${done}</div><div class="small muted">완료</div></div><div><div style="font-weight:800;font-size:18px;color:var(--gold);">${wait}</div><div class="small muted">검토중</div></div><div><div style="font-weight:800;font-size:18px;color:var(--danger);">${fail}</div><div class="small muted">놓침</div></div><div><div style="font-weight:800;font-size:18px;color:var(--muted);">${remain}</div><div class="small muted">남음</div></div></div></section>
</main>${renderTabbar('home')}</div>`;},
recap(){return `<div class="app"><main class="page" style="padding-top:18px;"><div style="border-radius:24px;overflow:hidden;background:linear-gradient(160deg,#5A8A7E,#4F7C72 50%,#3C6359);color:#fff;padding:30px 26px;position:relative;"><div style="position:absolute;right:-40px;top:-50px;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,.10);"></div><div style="position:relative;"><div style="font-size:13px;font-weight:700;opacity:.9;letter-spacing:.05em;">오늘일기 · 30일 리추얼</div><div style="font-size:25px;font-weight:800;letter-spacing:-0.03em;margin:8px 0 2px;">30일 완주 리포트 🏆</div><div class="small" style="opacity:.9;">지수 님의 기록</div><div style="margin:10px 0 -4px;"><div style="display:inline-block;background:rgba(255,255,255,.16);border-radius:22px;padding:6px;"><img src="docs/screens/char4.png" width="92" height="92" style="display:block;"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0;">${[['92%','이행률'],['28','완료한 미션'],['12일','최고 연속 🔥'],['3.8','평균 기분']].map(m=>`<div style="background:rgba(255,255,255,.14);border-radius:16px;padding:16px;"><div style="font-size:32px;font-weight:800;line-height:1;">${m[0]}</div><div class="small" style="opacity:.85;margin-top:4px;">${m[1]}</div></div>`).join('')}</div><div style="background:rgba(255,255,255,.14);border-radius:16px;padding:14px 16px;"><div class="small" style="opacity:.85;">메인 목표</div><div style="font-weight:800;font-size:16px;margin-top:3px;">수면 루틴 안정화</div></div><div class="between" style="margin-top:20px;align-items:flex-end;"><div class="small" style="opacity:.8;">2026-06-16 ~ 2026-07-15 · 일지 26개</div><div style="font-weight:800;font-size:14px;">#오늘일기</div></div></div></div><button class="btn warm mt16">📤 이미지로 공유 / 저장</button></main></div>`;}};
const k=new URLSearchParams(location.search).get('s')||'home';document.documentElement.classList.remove('dark');document.getElementById('app').outerHTML=S[k]();
</script></body></html>
