<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/style.css">
<style>body{background:#F6F4EF;}</style>
</head>
<body>
<div class="app" id="app" style="min-height:auto;"></div>

<script src="assets/app.js"></script>
<script>
const cell = (s,n)=>`<div class="cell ${s}">${n}</div>`;
const TRK = ['done','done','fail','done','done','done','done','done','wait','done','done','today']
  .concat(Array(18).fill('locked'));
const moods=[3,4,2,3,4,4,5,3,2,3,4,4], energy=[2,3,2,3,3,4,4,3,2,2,3,4];

const SCREENS = {
  home(){ const done=9,wait=1,fail=1,remain=18,rate=82,streak=4,stage=3,dayNo=12;
    return `<div class="app">
    <header class="topbar"><div class="brand"><span class="dot"></span> 오늘일기</div><div class="spacer"></div><button class="ico-btn">${icon('bell',19)}</button></header>
    <main class="page">
      <div class="greet-block"><span class="date-chip">6월 27일 (토) · 오후 3:56</span>
        <h1 class="greet">지수님,<br>나른한 오후예요 🌿</h1>
        <p class="greet-sub">오늘도 한 걸음, 같이 가요.</p>
        <div class="affirm">“하루 한 걸음이면 충분해”</div></div>
      <section class="card" style="text-align:center;">
        <div class="todayi-wrap">${todayiSvg(stage)}</div>
        <div style="font-weight:800;margin-top:4px;">오늘이 · ${TODAYI_LABELS[stage]}</div>
        <div class="small muted" style="margin-top:2px;">쑥쑥 크고 있어요</div>
        <div class="small" style="color:var(--primary);font-weight:700;margin-top:6px;">성장 가이드 보기 ›</div></section>
      <section class="card hero"><div class="between"><span class="eyebrow">오늘의 미션</span>
        <div class="row" style="gap:6px;"><span class="day-pill">🔥 ${streak}일</span><span class="day-pill">DAY ${dayNo} / 30</span></div></div>
        <h2>수면 루틴 안정화</h2><button class="btn warm">인증하기</button></section>
      <section class="card streak-card"><div class="streak-flame">🔥</div><div><div class="streak-n">${streak}일 연속 인증 중!</div><div class="small muted">오늘도 이어가면 ${streak+1}일 🔥</div></div></section>
      <section class="card"><div class="card-head"><span class="card-title">오늘 기분은 어때요?</span><span class="small muted">기록됨</span></div>
        <div class="mood-row">${[1,2,3,4,5].map(v=>`<div class="mood-opt ${v===4?'on':''}">${v}</div>`).join('')}</div></section>
      <section class="card"><div class="card-head"><span class="card-title">30일 여정</span><a class="small" style="color:var(--primary);font-weight:700;">전체 보기</a></div>
        <div class="between" style="margin-bottom:8px;"><span class="small muted">이행률</span><span style="font-weight:800;color:var(--primary-d);">${rate}%</span></div>
        <div class="progress"><i style="width:${rate}%"></i></div>
        <div class="row mt16" style="justify-content:space-between;text-align:center;">
          <div><div style="font-weight:800;font-size:18px;color:var(--primary);">${done}</div><div class="small muted">완료</div></div>
          <div><div style="font-weight:800;font-size:18px;color:var(--gold);">${wait}</div><div class="small muted">검토중</div></div>
          <div><div style="font-weight:800;font-size:18px;color:var(--danger);">${fail}</div><div class="small muted">놓침</div></div>
          <div><div style="font-weight:800;font-size:18px;color:var(--muted);">${remain}</div><div class="small muted">남음</div></div></div></section>
    </main>${renderTabbar('home')}</div>`; },

  tracker(){ return `<div class="app">
    <header class="topbar"><div class="brand"><span class="dot"></span> 30일 여정</div><div class="spacer"></div><button class="ico-btn">${icon('info',19)}</button></header>
    <main class="page"><h1 class="page-title">나의 30일 트래커</h1><p class="page-sub">매일의 미션을 한눈에. 칸을 눌러 그날 기록을 볼 수 있어요.</p>
      <section class="card"><div class="row" style="justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
        <span class="chip"><i style="width:9px;height:9px;border-radius:3px;background:var(--primary);"></i> 완료</span>
        <span class="chip"><i style="width:9px;height:9px;border-radius:3px;background:#E6D49A;"></i> 검토중</span>
        <span class="chip"><i style="width:9px;height:9px;border-radius:3px;background:var(--danger);"></i> 놓침</span>
        <span class="chip"><i style="width:9px;height:9px;border-radius:3px;border:2px dashed var(--primary);"></i> 오늘</span>
        <span class="chip"><i style="width:9px;height:9px;border-radius:3px;background:var(--line);"></i> 예정</span></div>
        <div class="tracker">${TRK.map((s,i)=>cell(s,i+1)).join('')}</div></section>
      <section class="card"><div class="card-title" style="margin-bottom:14px;">요약</div>
        <div class="kpi-row"><div class="kpi"><div class="n" style="color:var(--primary);">9</div><div class="l">완료</div></div>
          <div class="kpi"><div class="n" style="color:var(--gold);">1</div><div class="l">검토중</div></div>
          <div class="kpi"><div class="n" style="color:var(--danger);">1</div><div class="l">놓침</div></div></div>
        <div class="between mt8"><span class="small muted">현재 이행률</span><span style="font-weight:800;color:var(--primary-d);">82%</span></div>
        <div class="progress mt8"><i style="width:82%"></i></div></section>
    </main>${renderTabbar('tracker')}</div>`; },

  journal(){ const c=['#D9755B','#E89B72','#C9B873','#7DA697','#4F7C72'];
    return `<div class="app">
    <header class="topbar"><div class="brand"><span class="dot"></span> 일지</div><div class="spacer"></div><button class="ico-btn">${icon('edit',19)}</button></header>
    <main class="page"><h1 class="page-title">내 마음 추이</h1><p class="page-sub">최근 14일 동안의 기분과 에너지 흐름이에요.</p>
      <section class="card"><div class="card-head"><span class="card-title">14일 추이</span><span class="small muted">1~5점</span></div>
        ${lineChart([moods,energy])}<div class="legend"><span><i style="background:#4F7C72;"></i>기분</span><span><i style="background:#E89B72;"></i>에너지</span></div></section>
      <section class="card"><div class="grid2"><div class="center"><div style="font-weight:800;font-size:22px;color:var(--primary);">3.5</div><div class="small muted">평균 기분</div></div>
        <div class="center"><div style="font-weight:800;font-size:22px;color:var(--accent);">3.0</div><div class="small muted">평균 에너지</div></div></div></section>
      <div class="between" style="margin:22px 2px 12px;"><h2 class="card-title" style="font-size:16px;margin:0;">기록 모아보기</h2><span class="small muted">총 12일</span></div>
      <section class="card"><div class="between" style="margin-bottom:8px;"><strong style="font-size:14.5px;">DAY 12 · 06.27 (토)</strong><span class="badge ok">완료</span></div>
        <div class="small muted">🎯 수면 루틴 안정화</div>
        <div class="hr" style="margin:12px 0;"></div><div class="small muted" style="font-weight:700;margin-bottom:6px;">인증</div>
        <div style="aspect-ratio:16/9;border-radius:12px;background:linear-gradient(135deg,#DCE8E3,#EFE6DA);margin-bottom:8px;"></div>
        <div class="small">11시 전에 누워서 책 읽다 잠들었어요.</div>
        <div class="hr" style="margin:12px 0;"></div>
        <div class="row" style="gap:10px;align-items:flex-start;"><div class="avatar" style="width:34px;height:34px;border-radius:11px;background:${c[3]}1f;color:${c[3]};font-size:13px;">4</div>
          <div class="meta"><div class="nm" style="font-size:13px;">느낀점 · 좋음 · 에너지 4</div><div class="sub">개운하게 일어난 하루.</div></div></div>
        <div style="margin-top:12px;padding:12px 13px;border-radius:13px;background:var(--primary-soft);">
          <div class="small" style="font-weight:800;color:var(--primary-d);display:flex;align-items:center;gap:6px;margin-bottom:4px;">${icon('chat',14)} 코치 피드백</div>
          <div class="small" style="color:var(--primary-d);">좋은 시작이에요! 이 루틴 계속 가봐요 👏</div></div></section>
      <section class="card"><div class="between" style="margin-bottom:8px;"><strong style="font-size:14.5px;">DAY 11 · 06.26 (금)</strong><span class="badge ok">완료</span></div>
        <div class="small muted">🎯 수면 루틴 안정화</div>
        <div class="hr" style="margin:12px 0;"></div>
        <div class="row" style="gap:10px;align-items:flex-start;"><div class="avatar" style="width:34px;height:34px;border-radius:11px;background:${c[2]}1f;color:${c[2]};font-size:13px;">3</div>
          <div class="meta"><div class="nm" style="font-size:13px;">느낀점 · 보통</div><div class="sub">조금 늦게 잤지만 기록은 남김.</div></div></div></section>
    </main>${renderTabbar('journal')}</div>`; },

  goals(){ const g=[['수면 11시 전 취침',14,30,'일',47],['주 4회 운동',9,16,'회',56],['감사 한 줄',11,30,'일',37]];
    return `<div class="app">
    <header class="topbar"><div class="brand"><span class="dot"></span> 목표</div><div class="spacer"></div><button class="ico-btn">${icon('plus',20)}</button></header>
    <main class="page"><h1 class="page-title">서브 목표</h1><p class="page-sub">메인 목표를 받쳐주는 작은 목표들을 주차별로 채워가요.</p>
      <section class="card hero" style="margin-bottom:14px;"><span class="eyebrow">메인 목표 · 오늘의 미션</span><h2 style="margin:6px 0 0;">수면 루틴 안정화</h2>
        <p class="small" style="opacity:.85;margin:8px 0 0;">메인 목표는 코치가 설정/수정합니다.</p></section>
      ${g.map(x=>`<section class="card"><div class="between" style="margin-bottom:12px;"><span class="card-title">${x[0]}</span><span class="badge ${x[4]>=80?'ok':'muted'}">${x[4]}%</span></div>
        <div class="progress warm" style="margin-bottom:8px;"><i style="width:${x[4]}%"></i></div>
        <div class="between"><span class="small muted">${x[1]} / ${x[2]}${x[3]}</span><div class="row" style="gap:6px;"><button class="btn sm line">수정</button><button class="btn sm warm">＋ 기록</button></div></div></section>`).join('')}
      <button class="btn ghost mt8">서브 목표 추가</button>
    </main>${renderTabbar('goals')}</div>`; },

  profile(){ const badges=computeBadges({done:9,streak:4,journal:11,rate:82,day:12}); const got=badges.filter(b=>b.on).length;
    return `<div class="app">
    <header class="topbar"><div class="brand"><span class="dot"></span> 마이페이지</div><div class="spacer"></div><button class="ico-btn">${icon('gear',19)}</button></header>
    <main class="page">
      <section class="card" style="text-align:center;"><div class="avatar" style="width:72px;height:72px;border-radius:24px;font-size:26px;margin:6px auto 12px;">지</div>
        <div style="font-weight:800;font-size:18px;">지수</div><div class="small muted">jisoo@example.com</div>
        <div class="small" style="color:var(--primary-d);font-weight:700;margin-top:10px;">“하루 한 걸음이면 충분해”</div>
        <div class="row mt16" style="justify-content:center;gap:10px;"><span class="chip">DAY 12 / 30</span><span class="chip">🔥 4일</span><span class="chip">이행률 82%</span></div></section>
      <section class="card"><div class="card-head"><span class="card-title">내 배지</span><span class="small muted">${got}/${badges.length}</span></div>
        <div class="badge-grid">${badges.map(b=>`<div class="badge-item ${b.on?'on':''}"><div class="be">${b.emoji}</div><div class="bl">${b.label}</div></div>`).join('')}</div></section>
      <section class="card"><div class="card-title" style="margin-bottom:12px;">함께하는 코치</div>
        <div class="list-item"><div class="avatar warm">민</div><div class="meta"><div class="nm">민지 코치</div><div class="sub">수면 루틴 안정화</div></div></div>
        <div class="hr"></div><div class="between"><span class="small muted">진행 기간</span><span class="small" style="font-weight:700;">2026-06-16 ~ 2026-07-15</span></div></section>
      <section class="card"><div class="card-title" style="margin-bottom:14px;">이번 달 요약</div>
        <div class="kpi-row"><div class="kpi"><div class="n">9</div><div class="l">미션 완료</div></div><div class="kpi"><div class="n">11</div><div class="l">일지 작성</div></div><div class="kpi"><div class="n">3.5</div><div class="l">평균 기분</div></div></div>
        <a class="btn ghost mt12">📤 30일 리캡 카드 만들기</a></section>
    </main>${renderTabbar('profile')}</div>`; },

  recap(){ return `<div class="app"><main class="page" style="padding-top:18px;">
    <div style="border-radius:24px;overflow:hidden;background:linear-gradient(160deg,#5A8A7E 0%,#4F7C72 50%,#3C6359 100%);color:#fff;padding:30px 26px;position:relative;">
      <div style="position:absolute;right:-40px;top:-50px;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,.10);"></div>
      <div style="position:relative;"><div style="font-size:13px;font-weight:700;opacity:.9;letter-spacing:.05em;">오늘일기 · 30일 리추얼</div>
        <div style="font-size:25px;font-weight:800;letter-spacing:-0.03em;margin:8px 0 2px;">30일 완주 리포트 🏆</div>
        <div class="small" style="opacity:.9;">지수 님의 기록</div>
        <div style="margin:10px 0 -4px;"><div style="display:inline-block;background:rgba(255,255,255,.16);border-radius:22px;padding:6px;">${todayiSvg(6,{size:92})}</div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0;">
          ${[['92%','이행률'],['28','완료한 미션'],['12일','최고 연속 🔥'],['3.8','평균 기분']].map(m=>`<div style="background:rgba(255,255,255,.14);border-radius:16px;padding:16px;"><div style="font-size:32px;font-weight:800;line-height:1;">${m[0]}</div><div class="small" style="opacity:.85;margin-top:4px;">${m[1]}</div></div>`).join('')}</div>
        <div style="background:rgba(255,255,255,.14);border-radius:16px;padding:14px 16px;"><div class="small" style="opacity:.85;">메인 목표</div><div style="font-weight:800;font-size:16px;margin-top:3px;">수면 루틴 안정화</div></div>
        <div class="between" style="margin-top:20px;align-items:flex-end;"><div class="small" style="opacity:.8;">2026-06-16 ~ 2026-07-15 · 일지 26개</div><div style="font-weight:800;font-size:14px;">#오늘일기</div></div></div></div>
    <button class="btn warm mt16">📤 이미지로 공유 / 저장</button></main></div>`; },

  admin(){ return `<div class="app wide">
    <header class="topbar"><div class="brand"><span class="dot"></span> 코치 패널</div><div class="spacer"></div><span class="chip">민지</span><button class="ico-btn">${icon('logout',18)}</button></header>
    <main class="page"><div class="seg"><button class="on">대시보드</button><button>검토 2</button><button>멤버 연결</button></div>
      <div class="kpi-row"><div class="kpi"><div class="n">5</div><div class="l">함께하는 멤버</div></div>
        <div class="kpi"><div class="n" style="color:var(--danger);">1</div><div class="l">살펴볼 신호</div></div>
        <div class="kpi"><div class="n" style="color:var(--gold);">2</div><div class="l">검토 대기</div></div></div>
      <div class="card"><div class="card-title" style="margin-bottom:12px;">살펴볼 신호</div>
        <div class="alert"><div><div class="t">도윤 · 미션 미제출</div><div class="d">3일 연속 미션 미제출</div></div></div></div>
      <div class="card"><div class="card-head"><span class="card-title">함께하는 멤버</span><span class="small muted">이행률 · 평균기분</span></div>
        ${[['지수',12,82,3.6,'수면 루틴 안정화'],['민준',8,62,2.4,'아침 루틴 만들기']].map(m=>`<div class="list-item"><div class="avatar">${m[0][0]}</div>
          <div class="meta"><div class="nm">${m[0]}</div><div class="sub">DAY ${m[1]}/30 · 이행률 ${m[2]}% · 기분 ${m[3]}</div><div class="sub" style="color:var(--primary-d);">🎯 ${m[4]}</div></div>
          <span class="muted" style="font-size:22px;">›</span></div>`).join('')}</div>
    </main></div>`; },

  detail(){ return `<div class="app wide"><main class="page">
    <button class="btn sm line" style="margin-bottom:14px;">← 멤버 목록</button>
    <div class="row" style="gap:12px;margin-bottom:16px;"><div class="avatar" style="width:54px;height:54px;border-radius:17px;font-size:21px;">지</div>
      <div><div style="font-weight:800;font-size:19px;">지수</div><div class="small muted">DAY 12/30 · 2026-06-16 ~ 2026-07-15</div></div></div>
    <section class="card hero"><div class="between"><span class="eyebrow">메인 목표 · 오늘의 미션</span><button class="btn sm line">수정</button></div><h2 style="margin:8px 0 0;">수면 루틴 안정화</h2></section>
    <div class="kpi-row"><div class="kpi"><div class="n" style="color:var(--primary);">9</div><div class="l">완료</div></div><div class="kpi"><div class="n" style="color:var(--gold);">1</div><div class="l">검토중</div></div><div class="kpi"><div class="n" style="color:var(--danger);">1</div><div class="l">놓침</div></div></div>
    <div class="card"><div class="between" style="margin-bottom:8px;"><span class="small muted">이행률</span><span style="font-weight:800;color:var(--primary-d);">82%</span></div><div class="progress"><i style="width:82%"></i></div>
      <div class="between mt12"><span class="small muted">평균 기분</span><span style="font-weight:800;">3.6</span></div></div>
    <div class="card"><div class="card-title" style="margin-bottom:12px;">30일 트래커</div><div class="tracker">${TRK.map((s,i)=>cell(s,i+1)).join('')}</div></div>
    <div class="card"><div class="card-head"><span class="card-title">기분·에너지 추이</span><span class="small muted">1~5</span></div>${lineChart([moods,energy])}
      <div class="legend"><span><i style="background:#4F7C72;"></i>기분</span><span><i style="background:#E89B72;"></i>에너지</span></div></div>
    <div class="card"><div class="card-title" style="margin-bottom:6px;">기록 타임라인</div><p class="small muted" style="margin:0 0 8px;">미션 인증 · 느낀점 · 내 피드백</p>
      <div style="padding:12px 0;border-bottom:1px solid var(--line);"><div class="between"><strong class="small">DAY 12 · 06.27 (토)</strong><span class="badge ok">완료</span></div>
        <div class="small" style="margin-top:6px;">11시 전에 누웠어요.</div>
        <div style="margin-top:8px;padding:9px 11px;border-radius:11px;background:var(--primary-soft);" class="small"><b style="color:var(--primary-d);">내 피드백</b> · <span style="color:var(--primary-d);">좋은 시작이에요 👏</span></div></div></div>
    <div class="card"><div class="card-title" style="margin-bottom:12px;">코치 노트</div>
      <div class="field"><label>노트 날짜</label><input type="date" value="2026-06-27"></div>
      <div class="field"><textarea placeholder="관찰/상담 요약"></textarea></div>
      <button class="btn sm">노트 추가</button>
      <div class="hr"></div><div style="padding:11px 0;"><div class="between"><div class="small" style="font-weight:700;">취침 시간 안정적으로 자리잡는 중</div><span class="chip">2026-06-25</span></div>
        <div class="small muted" style="margin-top:3px;">다음 포커스: 기상 시간 고정</div></div></div>
  </main></div>`; },
};

const key = new URLSearchParams(location.search).get('s') || 'home';
document.documentElement.classList.remove('dark');
document.getElementById('app').outerHTML = SCREENS[key]();
</script>
</body>
</html>
