<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>일지 — 오늘일기</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand"><span class="dot"></span> 일지</div>
    <div class="spacer"></div>
    <button class="ico-btn" id="write" onclick="openModal('m-write')"></button>
  </header>

  <main class="page">
    <h1 class="page-title">내 마음 추이</h1>
    <p class="page-sub">최근 14일 동안의 기분과 에너지 흐름이에요.</p>

    <section class="card">
      <div class="card-head">
        <span class="card-title">14일 추이</span>
        <span class="small muted">1~5점</span>
      </div>
      <div id="chart"></div>
      <div class="legend">
        <span><i style="background:#4F7C72;"></i>기분</span>
        <span><i style="background:#E89B72;"></i>에너지</span>
      </div>
    </section>

    <section class="card">
      <div class="grid2">
        <div class="center"><div style="font-weight:800;font-size:22px;color:var(--primary);" id="avg-mood">–</div><div class="small muted">평균 기분</div></div>
        <div class="center"><div style="font-weight:800;font-size:22px;color:var(--accent);" id="avg-energy">–</div><div class="small muted">평균 에너지</div></div>
      </div>
    </section>

    <div class="between" style="margin:22px 2px 12px;">
      <h2 class="card-title" style="font-size:16px;margin:0;">기록 모아보기</h2>
      <span class="small muted" id="feed-count"></span>
    </div>
    <div id="feed"><p class="small muted">불러오는 중…</p></div>
  </main>

  <div id="tabbar-slot"></div>
</div>

<!-- 일지 작성 모달 -->
<div class="modal-bg" id="m-write">
  <div class="modal">
    <div class="grip"></div>
    <h3 style="margin:0 0 16px;font-size:17px;font-weight:800;">오늘의 일지</h3>
    <div class="field"><label>기분 (1~5)</label>
      <div class="mood-row" id="w-mood"></div>
    </div>
    <div class="field"><label>에너지 (1~5)</label>
      <div class="mood-row" id="w-energy"></div>
    </div>
    <div class="field"><label>오늘 있었던 일 / 느낀 점</label>
      <textarea id="w-note" placeholder="떠오르는 대로 편하게 적어보세요"></textarea>
    </div>
    <button class="btn" id="w-save" onclick="saveJournal()">저장하기</button>
    <button class="btn line mt8" onclick="closeModal('m-write')">닫기</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js"></script>
<script src="assets/api.js"></script>
<script src="assets/app.js"></script>
<script>
  const moodColor = ['#D9755B','#E89B72','#C9B873','#7DA697','#4F7C72'];
  let ENR, PICK_M = null, PICK_E = null;

  (async function init() {
    document.getElementById('write').innerHTML = icon('edit', 19);
    document.getElementById('tabbar-slot').innerHTML = renderTabbar('journal');
    bindMood(document.getElementById('w-mood'),   v => PICK_M = v);
    bindMood(document.getElementById('w-energy'), v => PICK_E = v);

    const me = await API.guard('member'); if (!me) return;
    ENR = await API.myEnrollment();
    if (!ENR) { empty(); return; }
    await load();
  })();

  const STATUS = { approved:['완료','ok'], pending_review:['검토중','wait'], failed:['놓침','fail'],
                   today:['오늘','wait'], locked:['예정','muted'], skipped:['건너뜀','muted'] };

  function empty() {
    document.getElementById('write').style.display = 'none';
    document.getElementById('chart').innerHTML =
      '<p class="small muted center" style="padding:24px 0;">30일이 시작되면 기록이 쌓여요.</p>';
    document.getElementById('feed').innerHTML =
      '<p class="small muted" style="margin:0;">아직 기록이 없어요.</p>';
  }

  function wd(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return ['일','월','화','수','목','금','토'][d.getDay()];
  }

  async function load() {
    const [tasks, logs] = await Promise.all([API.tracker(ENR.id), API.moodAll(ENR.id)]);

    // ---- 기분/에너지 추이 차트 ----
    if (logs.length >= 2) {
      const recent = logs.slice(-14);
      const moods  = recent.map(l => l.mood);
      const energy = recent.map(l => l.energy ?? l.mood);
      document.getElementById('chart').innerHTML = lineChart([moods, energy]);
      const avg = arr => Math.round(arr.reduce((s, v) => s + v, 0) / arr.length * 10) / 10;
      document.getElementById('avg-mood').textContent = avg(moods);
      document.getElementById('avg-energy').textContent = avg(energy);
    } else if (logs.length === 1) {
      document.getElementById('chart').innerHTML =
        '<p class="small muted center" style="padding:28px 0;">기록이 2일 이상 쌓이면 추이 그래프가 그려져요.</p>';
      document.getElementById('avg-mood').textContent = logs[0].mood;
      document.getElementById('avg-energy').textContent = logs[0].energy ?? logs[0].mood;
    } else {
      document.getElementById('chart').innerHTML =
        '<p class="small muted center" style="padding:28px 0;">첫 일지를 남겨보세요.</p>';
    }

    // ---- 날짜별로 미션·인증·일지·코치 피드백 병합 ----
    const byDate = {};
    tasks.forEach(t => { (byDate[t.date] = byDate[t.date] || {}).task = t; });
    logs.forEach(l => { (byDate[l.date] = byDate[l.date] || {}).mood = l; });

    let days = Object.keys(byDate).map(d => ({ date: d, ...byDate[d] }))
      .filter(x => (x.task && ['approved','pending_review','failed'].includes(x.task.status)) || x.mood)
      .sort((a, b) => (a.date < b.date ? 1 : -1));   // 최신순 누적

    document.getElementById('feed-count').textContent = days.length ? `총 ${days.length}일` : '';

    if (!days.length) {
      document.getElementById('feed').innerHTML =
        '<section class="card"><p class="small muted" style="margin:0;">아직 기록이 없어요. 오른쪽 위 ✎ 로 오늘 일지를 남기거나, 홈에서 미션을 인증해보세요.</p></section>';
      return;
    }

    // 인증 사진 서명 URL 미리 받아두기
    await Promise.all(days.map(async x => {
      if (x.task?.proof_url) {
        const { data } = await sb.storage.from('proofs').createSignedUrl(x.task.proof_url, 600);
        x.img = data?.signedUrl || null;
      }
    }));

    document.getElementById('feed').innerHTML = days.map(x => {
      const md = x.date.slice(5).replace('-', '.');
      const dayNo = x.task ? x.task.day_number : null;
      const [stLabel, stCls] = x.task ? (STATUS[x.task.status] || STATUS.locked) : [null, null];
      const mission = x.task
        ? (x.task.mission && x.task.mission !== '오늘의 미션' ? x.task.mission : (ENR.goal_summary || ''))
        : '';

      // 인증 블록
      let proof = '';
      if (x.task && ['approved','pending_review','failed'].includes(x.task.status)) {
        proof = `<div class="hr" style="margin:12px 0;"></div>
          <div class="small muted" style="font-weight:700;margin-bottom:6px;">인증</div>`;
        if (x.img) proof += `<div style="border-radius:12px;overflow:hidden;margin-bottom:8px;"><img src="${x.img}" style="width:100%;display:block;"></div>`;
        proof += `<div class="small">${x.task.proof_text ? x.task.proof_text : '<span class="muted">메모 없음</span>'}</div>`;
      }

      // 느낀점(일지) 블록
      let mood = '';
      if (x.mood) {
        const c = moodColor[x.mood.mood - 1];
        mood = `<div class="hr" style="margin:12px 0;"></div>
          <div class="row" style="gap:10px;align-items:flex-start;">
            <div class="avatar" style="width:34px;height:34px;border-radius:11px;background:${c}1f;color:${c};font-size:13px;">${x.mood.mood}</div>
            <div class="meta"><div class="nm" style="font-size:13px;">느낀점 · ${MOOD_LABELS[x.mood.mood - 1]}${x.mood.energy ? ` · 에너지 ${x.mood.energy}` : ''}</div>
              <div class="sub">${x.mood.note ? x.mood.note : '<span class="muted">한 줄 기록만 남김</span>'}</div></div>
          </div>`;
      }

      // 코치 피드백 블록
      let fb = '';
      if (x.task && x.task.review_note) {
        fb = `<div style="margin-top:12px;padding:12px 13px;border-radius:13px;background:var(--primary-soft);">
          <div class="small" style="font-weight:800;color:var(--primary-d);display:flex;align-items:center;gap:6px;margin-bottom:4px;">
            ${icon('chat', 14)} 코치 피드백</div>
          <div class="small" style="color:var(--primary-d);">${x.task.review_note}</div></div>`;
      }

      return `<section class="card">
        <div class="between" style="margin-bottom:${mission ? '8' : '0'}px;">
          <strong style="font-size:14.5px;">${dayNo ? `DAY ${dayNo} · ` : ''}${md} (${wd(x.date)})</strong>
          ${stLabel ? `<span class="badge ${stCls}">${stLabel}</span>` : ''}
        </div>
        ${mission ? `<div class="small muted">🎯 ${mission}</div>` : ''}
        ${proof}${mood}${fb}
      </section>`;
    }).join('');
  }

  async function saveJournal() {
    if (!PICK_M) return toast('기분을 먼저 골라주세요');
    const note = document.getElementById('w-note').value;
    const btn = document.getElementById('w-save'); btn.disabled = true; btn.textContent = '저장 중…';
    try {
      await API.logMood(ENR.id, PICK_M, PICK_E, note);
      closeModal('m-write');
      document.getElementById('w-note').value = '';
      document.querySelectorAll('#w-mood .mood-opt, #w-energy .mood-opt').forEach(o => o.classList.remove('on'));
      PICK_M = PICK_E = null;
      toast('일지를 저장했어요');
      await load();
    } catch (e) { toast(e.message || '저장 실패'); }
    finally { btn.disabled = false; btn.textContent = '저장하기'; }
  }
</script>
</body>
</html>
