<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>오늘이 성장 가이드 — 오늘일기</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand"><span class="dot"></span> 오늘이 성장 가이드</div>
    <div class="spacer"></div>
    <a href="home.html" class="btn sm line">닫기</a>
  </header>

  <main class="page">
    <h1 class="page-title">오늘이는 함께 자라요 🌱</h1>
    <p class="page-sub">미션을 완료할수록 오늘이가 단계별로 성장해요. 30일 끝엔 활짝 만개!</p>
    <div id="list"></div>

    <div class="card" style="display:flex;gap:14px;align-items:center;background:var(--surface-2);">
      <div style="width:72px;flex-shrink:0;text-align:center;" id="wilt-art"></div>
      <div><div style="font-weight:800;">⚡ 방전 상태</div>
        <div class="small muted">연속으로 인증을 놓치면 오늘이가 방전돼요. 오늘 인증 한 번이면 다시 충전됩니다.</div></div>
    </div>
  </main>

  <div id="tabbar-slot"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js"></script>
<script src="assets/api.js"></script>
<script src="assets/app.js"></script>
<script>
  const COND = ['미션 0~7개', '미션 8~14개', '미션 15~21개', '미션 22~29개', '30개 전부 완주 시 🎉'];

  // 단계 목록 즉시 렌더 (로그인 불필요) — 1~5단계 이미지 + 응원 메시지
  document.getElementById('list').innerHTML = CHAR4_LABELS.map((label, idx) => {
    const n = idx + 1;
    return `<div class="card stage-row" data-stage="${n}" style="display:flex;gap:14px;align-items:center;">
      <div style="width:90px;flex-shrink:0;text-align:center;">${charImg(n, { size: 84 })}</div>
      <div style="flex:1;">
        <div class="between" style="margin-bottom:4px;">
          <b style="font-size:15px;">${n}. ${label}</b>
          <span class="cur-tag" style="display:none;font-size:11px;font-weight:800;color:var(--primary-d);background:var(--primary-soft);padding:3px 9px;border-radius:999px;">현재</span>
        </div>
        <div class="small" style="color:var(--text);margin-bottom:3px;">${CHAR4_MSG[idx]}</div>
        <div class="small muted">${COND[idx]}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('wilt-art').innerHTML = charImg('wilt', { size: 72, base: 2 });

  // 로그인 상태면 현재 단계 표시 + 탭바
  (async function () {
    try {
      document.getElementById('tabbar-slot').innerHTML = renderTabbar('profile');
      const me = await API.me(); if (!me) return;
      const enr = await API.myEnrollment(); if (!enr) return;
      const stats = await API.enrollmentStats(enr.id);
      const cur = charStage4(stats.done);
      const row = document.querySelector(`.stage-row[data-stage="${cur}"]`);
      if (row) { row.style.border = '2px solid var(--primary)'; row.querySelector('.cur-tag').style.display = 'inline-block'; }
    } catch (e) {}
  })();
</script>
</body>
</html>
