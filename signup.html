<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>시작하기 — 오늘일기</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="app" style="display:flex;flex-direction:column;min-height:100vh;padding-bottom:0;">
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:40px 28px;">
    <div style="width:48px;height:48px;border-radius:15px;background:var(--primary);position:relative;margin-bottom:22px;">
      <span style="position:absolute;inset:14px;border:3px solid rgba(255,255,255,.9);border-radius:5px;"></span>
    </div>
    <h1 style="font-size:26px;font-weight:800;letter-spacing:-0.03em;margin:0 0 6px;">30일, 오늘부터</h1>
    <p class="muted" style="margin:0 0 20px;">멤버 또는 코치로 시작하세요.</p>

    <div class="seg" id="role-seg" style="margin-bottom:18px;">
      <button type="button" class="on" data-r="member">멤버로 시작</button>
      <button type="button" data-r="coach">코치로 시작</button>
    </div>

    <div class="field"><label>이름 / 닉네임</label><input id="name" placeholder="지수"></div>
    <div class="field" id="coach-field"><label>담당 코치 이름</label>
      <input id="coach" placeholder="예: 민지 코치">
      <p class="small muted" style="margin:6px 2px 0;">코치에게 안내받은 이름을 정확히 입력하세요.</p>
    </div>
    <div class="field"><label>이메일</label><input id="email" type="email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="field"><label>비밀번호 (6자 이상)</label><input id="pw" type="password" placeholder="••••••••" autocomplete="new-password"></div>

    <button class="btn block mt8" id="go" onclick="doSignup()">시작하기</button>
    <p class="center muted small mt16">이미 계정이 있으세요? <a href="login.html" style="color:var(--primary);font-weight:700;">로그인</a></p>
  </div>
</div>

<div class="modal-bg" id="m-done">
  <div class="modal">
    <div class="grip"></div>
    <h3 style="margin:0 0 8px;font-size:18px;font-weight:800;">가입 완료</h3>
    <p class="small muted" style="margin:0 0 18px;" id="done-msg">이메일 확인 후 로그인해주세요.</p>
    <a href="login.html" class="btn">로그인하러 가기</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js"></script>
<script src="assets/api.js"></script>
<script src="assets/app.js"></script>
<script>
  if (!CONFIG_OK) location.href = 'setup.html';

  // 역할 토글 — 멤버일 때만 코치 이름 입력 표시
  let ROLE = 'member';
  const coachField = document.getElementById('coach-field');
  document.getElementById('role-seg').addEventListener('click', e => {
    const b = e.target.closest('button[data-r]'); if (!b) return;
    ROLE = b.dataset.r;
    document.querySelectorAll('#role-seg button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    coachField.style.display = ROLE === 'member' ? '' : 'none';
  });

  async function doSignup() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('pw').value;
    const coach = document.getElementById('coach').value.trim();
    if (!name || !email || pw.length < 6) return toast('이름·이메일·6자 이상 비밀번호를 입력하세요');
    if (ROLE === 'member' && !coach) return toast('담당 코치 이름을 입력하세요');

    const btn = document.getElementById('go'); btn.disabled = true; btn.textContent = '가입 중…';
    try {
      await API.signUp(email, pw, name, ROLE, ROLE === 'member' ? coach : '');
      // 이메일 확인이 꺼져 있으면 즉시 세션이 생김 → 역할별 홈, 아니면 안내 모달
      const me = await API.me();
      if (me) {
        location.href = ['coach', 'admin'].includes(me.role) ? 'admin.html' : 'home.html';
      } else {
        document.getElementById('done-msg').textContent = ROLE === 'coach'
          ? '코치 계정이 생성됐어요. 이메일 확인 후 로그인하면 코치 패널로 들어갑니다.'
          : '가입이 접수됐어요. 이메일 확인 후 로그인하면, 지정한 코치가 연결해드립니다.';
        openModal('m-done');
      }
    } catch (e) { toast(e.message || '가입 실패'); btn.disabled = false; btn.textContent = '시작하기'; }
  }
</script>
</body>
</html>
