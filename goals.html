<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>목표 — 이음</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand"><span class="dot"></span> 목표</div>
    <div class="spacer"></div>
    <button class="ico-btn" id="add" onclick="openModal('m-goal')"></button>
  </header>

  <main class="page">
    <h1 class="page-title">이번 달 목표</h1>
    <p class="page-sub">시작할 때 정한 목표를 주차별로 채워가요.</p>

    <div id="goals"></div>

    <button class="btn ghost mt8" onclick="openModal('m-goal')">목표 추가</button>
  </main>

  <div id="tabbar-slot"></div>
</div>

<!-- 진척 기록 모달 -->
<div class="modal-bg" id="m-check">
  <div class="modal">
    <div class="grip"></div>
    <h3 style="margin:0 0 4px;font-size:17px;font-weight:800;" id="c-title">목표</h3>
    <p class="small muted" style="margin:0 0 16px;">이번 주 진척을 더해보세요.</p>
    <div class="field"><label>이번에 달성한 수치</label>
      <input type="number" placeholder="예: 2" inputmode="numeric">
    </div>
    <div class="field"><label>메모 (선택)</label><textarea placeholder="어떻게 했나요?"></textarea></div>
    <button class="btn" onclick="closeModal('m-check');toast('진척을 기록했어요')">기록하기</button>
    <button class="btn line mt8" onclick="closeModal('m-check')">닫기</button>
  </div>
</div>

<!-- 목표 추가 모달 -->
<div class="modal-bg" id="m-goal">
  <div class="modal">
    <div class="grip"></div>
    <h3 style="margin:0 0 16px;font-size:17px;font-weight:800;">새 목표</h3>
    <div class="field"><label>목표 이름</label><input placeholder="예: 주 4회 운동하기"></div>
    <div class="grid2">
      <div class="field"><label>목표치</label><input type="number" placeholder="16"></div>
      <div class="field"><label>단위</label><input placeholder="회 / 일"></div>
    </div>
    <button class="btn" onclick="closeModal('m-goal');toast('목표를 추가했어요')">추가하기</button>
    <button class="btn line mt8" onclick="closeModal('m-goal')">닫기</button>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  document.getElementById('add').innerHTML = icon('plus', 20);
  document.getElementById('goals').innerHTML = MOCK.goals.map((g)=>{
    const pct = Math.round(g.cur/g.target*100);
    return `<section class="card">
      <div class="between" style="margin-bottom:12px;">
        <span class="card-title">${g.title}</span>
        <span class="badge ${pct>=80?'ok':'muted'}">${pct}%</span>
      </div>
      <div class="progress warm" style="margin-bottom:8px;"><i style="width:${pct}%"></i></div>
      <div class="between">
        <span class="small muted">${g.cur} / ${g.target}${g.unit}</span>
        <button class="btn sm warm" onclick="document.getElementById('c-title').textContent='${g.title}';openModal('m-check')">＋ 기록</button>
      </div>
      <div class="row mt12" style="gap:6px;">
        ${[1,2,3,4].map(w=>`<div style="flex:1;text-align:center;padding:7px 0;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);font-size:11px;font-weight:700;color:${w<=Math.ceil(pct/25)?'var(--accent)':'var(--muted)'};">${w}주차</div>`).join('')}
      </div>
    </section>`;
  }).join('');
  document.getElementById('tabbar-slot').innerHTML = renderTabbar('goals');
</script>
</body>
</html>
