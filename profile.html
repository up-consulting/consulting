<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>마이 — 이음</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand"><span class="dot"></span> 마이페이지</div>
    <div class="spacer"></div>
    <button class="ico-btn" id="gear" onclick="toast('설정')"></button>
  </header>

  <main class="page">
    <!-- 프로필 -->
    <section class="card" style="text-align:center;">
      <div class="avatar" style="width:72px;height:72px;border-radius:24px;font-size:26px;margin:6px auto 12px;">지</div>
      <div style="font-weight:800;font-size:18px;">지수</div>
      <div class="small muted">jisoo@example.com</div>
      <div class="row mt16" style="justify-content:center;gap:10px;">
        <span class="chip">DAY 12 / 30</span>
        <span class="chip">이행률 83%</span>
      </div>
    </section>

    <!-- 함께하는 코치 -->
    <section class="card">
      <div class="card-title" style="margin-bottom:12px;">함께하는 코치</div>
      <div class="list-item">
        <div class="avatar warm">민</div>
        <div class="meta"><div class="nm">민지 코치</div><div class="sub">마음숲 · 고정 매칭</div></div>
        <button class="btn sm line" id="msg" onclick="toast('코치에게 메시지')"></button>
      </div>
      <div class="hr"></div>
      <div class="between">
        <span class="small muted">다음 만남</span>
        <span class="small" style="font-weight:700;">6월 27일 (금) 오후 3시</span>
      </div>
    </section>

    <!-- 이번 달 요약 -->
    <section class="card">
      <div class="card-title" style="margin-bottom:14px;">이번 달 요약</div>
      <div class="kpi-row">
        <div class="kpi"><div class="n">9</div><div class="l">미션 완료</div></div>
        <div class="kpi"><div class="n">11</div><div class="l">일지 작성</div></div>
        <div class="kpi"><div class="n">3.4</div><div class="l">평균 기분</div></div>
      </div>
    </section>

    <!-- 설정 -->
    <section class="card">
      <div class="card-title" style="margin-bottom:6px;">설정</div>
      <div class="list-item"><div class="meta"><div class="nm">알림 받기</div></div><span class="chip" style="background:var(--primary-soft);color:var(--primary-d);border:none;">ON</span></div>
      <div class="list-item"><div class="meta"><div class="nm">다짐 문구 바꾸기</div></div><span class="muted">›</span></div>
      <div class="list-item"><div class="meta"><div class="nm">문의하기</div></div><span class="muted">›</span></div>
    </section>

    <a href="index.html" class="btn danger-ghost mt8">로그아웃</a>
  </main>

  <div id="tabbar-slot"></div>
</div>

<script src="assets/app.js"></script>
<script>
  document.getElementById('gear').innerHTML = icon('gear', 19);
  document.getElementById('msg').innerHTML = icon('chat', 16);
  document.getElementById('tabbar-slot').innerHTML = renderTabbar('profile');
</script>
</body>
</html>
