<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>마이 — 오늘일기</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand"><span class="dot"></span> 마이페이지</div>
    <div class="spacer"></div>
    <button class="ico-btn" id="gear" onclick="toast('설정')"></button>
  </header>

  <main class="page">
    <div id="content"><p class="small muted">불러오는 중…</p></div>

    <!-- 설정 -->
    <section class="card">
      <div class="card-title" style="margin-bottom:6px;">설정</div>
      <div class="list-item"><div class="meta"><div class="nm">알림 받기</div></div><span class="chip" style="background:var(--primary-soft);color:var(--primary-d);border:none;">ON</span></div>
      <div class="list-item" style="cursor:pointer;" onclick="editAffirmation()"><div class="meta"><div class="nm">다짐 문구 바꾸기</div></div><span class="muted">›</span></div>
      <div class="list-item" style="cursor:pointer;" onclick="toast('문의: 3growthlab@gmail.com')"><div class="meta"><div class="nm">문의하기</div></div><span class="muted">›</span></div>
    </section>

    <a href="#" class="btn danger-ghost mt8" onclick="logout();return false;">로그아웃</a>
  </main>

  <div id="tabbar-slot"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js"></script>
<script src="assets/api.js"></script>
<script src="assets/app.js"></script>
<script>
  let ME;

  (async function init() {
    document.getElementById('gear').innerHTML = icon('gear', 19);
    document.getElementById('tabbar-slot').innerHTML = renderTabbar('profile');
    ME = await API.guard('member'); if (!ME) return;

    const enr = await API.myEnrollment();
    const initial = (ME.name || '?').slice(0, 1);

    let chips = '<span class="chip">코치 연결 대기중</span>';
    let coachCard = `
      <section class="card">
        <div class="card-title" style="margin-bottom:6px;">함께하는 코치</div>
        <p class="small muted" style="margin:0;">아직 연결된 코치가 없어요.</p>
      </section>`;
    let summaryCard = '', badgeCard = '';

    if (enr) {
      const [stats, logs, tasks] = await Promise.all([
        API.enrollmentStats(enr.id), API.moodAll(enr.id), API.tracker(enr.id),
      ]);
      const streak = currentStreak(tasks);
      chips = `<span class="chip">DAY ${stats.day} / 30</span>${streak > 0 ? `<span class="chip">🔥 ${streak}일</span>` : ''}<span class="chip">이행률 ${stats.rate}%</span>`;

      const badges = computeBadges({ done: stats.done, streak, journal: logs.length, rate: stats.rate, day: stats.day });
      const got = badges.filter(b => b.on).length;
      badgeCard = `
        <section class="card">
          <div class="card-head"><span class="card-title">내 배지</span><span class="small muted">${got}/${badges.length}</span></div>
          <div class="badge-grid">
            ${badges.map(b => `<div class="badge-item ${b.on ? 'on' : ''}">
              <div class="be">${b.emoji}</div><div class="bl">${b.label}</div></div>`).join('')}
          </div>
        </section>`;

      const coachName = enr.coach?.name || '코치';
      coachCard = `
        <section class="card">
          <div class="card-title" style="margin-bottom:12px;">함께하는 코치</div>
          <div class="list-item">
            <div class="avatar warm">${coachName.slice(0, 1)}</div>
            <div class="meta"><div class="nm">${coachName}</div>
              <div class="sub">${enr.goal_summary || '30일 고정 매칭'}</div></div>
          </div>
          <div class="hr"></div>
          <div class="between">
            <span class="small muted">진행 기간</span>
            <span class="small" style="font-weight:700;">${enr.start_date} ~ ${enr.end_date}</span>
          </div>
        </section>`;

      summaryCard = `
        <section class="card">
          <div class="card-title" style="margin-bottom:14px;">이번 달 요약</div>
          <div class="kpi-row">
            <div class="kpi"><div class="n">${stats.done}</div><div class="l">미션 완료</div></div>
            <div class="kpi"><div class="n">${logs.length}</div><div class="l">일지 작성</div></div>
            <div class="kpi"><div class="n">${stats.moodAvg || '–'}</div><div class="l">평균 기분</div></div>
          </div>
        </section>`;
    }

    document.getElementById('content').innerHTML = `
      <section class="card" style="text-align:center;">
        <div class="avatar" style="width:72px;height:72px;border-radius:24px;font-size:26px;margin:6px auto 12px;">${initial}</div>
        <div style="font-weight:800;font-size:18px;">${ME.name}</div>
        <div class="small muted">${ME.email}</div>
        ${ME.affirmation ? `<div class="small" style="color:var(--primary-d);font-weight:700;margin-top:10px;">“${ME.affirmation}”</div>` : '<div class="small muted" style="margin-top:10px;">아래 설정에서 나만의 다짐 문구를 적어보세요.</div>'}
        <div class="row mt16" style="justify-content:center;gap:10px;">${chips}</div>
      </section>
      ${badgeCard}
      ${coachCard}
      ${summaryCard}`;
  })();

  async function editAffirmation() {
    const cur = ME.affirmation || '';
    const v = prompt('나를 위한 다짐 한 줄', cur);
    if (v === null) return;
    try {
      const { error } = await sb.from('profiles').update({ affirmation: v }).eq('id', ME.id);
      if (error) throw error;
      ME.affirmation = v; toast('다짐 문구를 저장했어요');
    } catch (e) { toast(e.message || '저장 실패'); }
  }

  async function logout() {
    await API.signOut();
    location.href = 'index.html';
  }
</script>
</body>
</html>
